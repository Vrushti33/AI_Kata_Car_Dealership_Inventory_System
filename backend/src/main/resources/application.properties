# Server Port
server.port=${SERVER_PORT:8080}

# Local PostgreSQL 17 database configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:car_dealership}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Config - Validate schema using entity definitions against the Flyway-managed schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT credentials
jwt.secret=${JWT_SECRET:dGhpc0lzQVNlY3VyZTI1NkJpdEtleUZvckpXVFNpZ25pbmc=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
